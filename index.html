<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LandingCraft</title>
    <link href="./output.css" rel="stylesheet">  <!-- FIXED PATH -->
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900/20 to-slate-900 text-white min-h-screen">
    <!-- ALL YOUR CONTENT HERE -->
    <nav class="fixed top-0 w-full backdrop-blur-xl bg-white/10 z-50 border-b border-white/10">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">LandingCraft</h1>
            <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-xl bg-white/20 hover:bg-white/30 transition-all">🌙☀️</button>
        </div>
    </nav>
    
    <section class="pt-32 pb-20 px-6 text-center">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-5xl md:text-7xl font-black bg-gradient-to-r from-blue-400 via-purple-500 to-pink-500 bg-clip-text text-transparent mb-8 leading-tight animate-pulse">
                Tailwind CSS
                <span class="block text-4xl font-normal bg-gradient-to-r from-slate-300 to-slate-100 bg-clip-text text-transparent mt-4">Production Ready</span>
            </h1>
            <p class="text-xl text-slate-400 mb-12 max-w-2xl mx-auto opacity-90 leading-relaxed">GitHub Pages • Zero config • Lightning fast</p>
            <div class="flex flex-col sm:flex-row gap-4 justify-center max-w-md mx-auto">
                <button class="px-12 py-6 bg-gradient-to-r from-blue-500 to-purple-500 text-white font-bold text-xl rounded-3xl hover:from-blue-600 hover:to-purple-600 shadow-2xl hover:shadow-3xl transform hover:-translate-y-2 active:scale-95 transition-all duration-300 flex-1">
                    Get Started
                </button>
                <button class="px-12 py-6 border-2 border-white/30 bg-white/10 backdrop-blur-xl text-white font-semibold text-xl rounded-3xl hover:bg-white/20 hover:border-white/50 transition-all shadow-xl hover:shadow-2xl">
                    Live Demo
                </button>
            </div>
        </div>
    </section>

    <h1 class="text-6xl font-heading font-black bg-gradient-to-r from-brand-500 via-accent-500 to-pink-500 bg-clip-text text-transparent">
  LandingCraft
</h1>

<button class="btn-brand text-lg">Get Started</button>
<div class="glassmorphism max-w-2xl mx-auto">
  Custom glass card
</div>

<div class="bg-neutral-950/50 backdrop-blur-xl p-8 rounded-3xl border border-neutral-800">
  Dark neutral background
</div>
    
    <script>
        if (localStorage.theme === 'light' || (!localStorage.theme && window.matchMedia('(prefers-color-scheme: light)').matches)) {
            document.documentElement.classList.remove('dark');
        }
    </script>
</body>
</html>
