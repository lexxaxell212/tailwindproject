name: Deploy Tailwind CSS
on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: 24
    
    # DIRECT TAILWIND CLI - NO NPM INSTALL
    - name: Build Tailwind CSS
      run: |
        npx tailwindcss@latest --input ./src/input.css --output ./dist/output.css --minify
        mkdir -p dist
        cp ./src/index.html ./dist/
    
    - name: Deploy
      uses: actions/deploy-pages@v5
