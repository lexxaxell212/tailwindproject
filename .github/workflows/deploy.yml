name: Deploy Tailwind CSS
on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5  # Updated v5
    
    - name: Setup Node.js 24
      uses: actions/setup-node@v5  # Updated v5
      with:
        node-version: 24  # Node 24 ✅
    
    - name: Install & Build Tailwind
      run: |
        npm install tailwindcss@latest
        mkdir -p dist
        npx tailwindcss -i ./src/input.css -o ./dist/output.css --minify
        cp ./src/index.html ./dist/
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5  # Updated v5
