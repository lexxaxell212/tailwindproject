name: Deploy Tailwind
on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Build with Tailwind CLI
        uses: actions-rs/tailwindcss-action@v1
        with:
          input: src/input.css
          output: dist/output.css
      
      - name: Copy HTML
        run: |
          mkdir -p dist
          cp src/index.html dist/
          cp src/input.css dist/
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
