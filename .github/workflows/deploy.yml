name: Deploy Tailwind CSS
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    # BUILD TAILWIND (NO NPM CACHE)
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install Tailwind
      run: npm install tailwindcss@latest
    
    - name: Build CSS
      run: npx tailwindcss -i ./src/input.css -o ./dist/output.css --minify
    
    - name: Create index.html
      run: mkdir -p dist && cp src/index.html dist/
    
    - name: Deploy
      id: deployment
      uses: actions/deploy-pages@v4
